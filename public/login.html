<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Student Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6c8fff;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --muted: #9ca3af;
      --surface: rgba(10,12,18,0.82);
      --border: rgba(255,255,255,0.1);
      --error: #f87171;
      --success: #34d399;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Full-screen split layout */
    .page {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* LEFT — photo panel */
    .photo-panel {
      flex: 1.1;
      position: relative;
      background: #0a0c12;
      overflow: hidden;
    }

    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0.88;
    }

    /* Gradient overlay on photo */
    .photo-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(10,12,18,0.15) 0%,
        rgba(10,12,18,0.55) 100%
      );
    }

    /* Branding on photo */
    .photo-brand {
      position: absolute;
      top: 36px;
      left: 36px;
      z-index: 2;
      animation: fadeUp 0.7s ease both;
    }

    .photo-brand .logo-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    .photo-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .photo-brand h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .photo-brand p {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 6px;
      font-weight: 300;
    }

    /* Quote / tagline at bottom of photo */
    .photo-quote {
      position: absolute;
      bottom: 36px;
      left: 36px;
      right: 36px;
      z-index: 2;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .photo-quote blockquote {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      border-left: 2px solid var(--accent);
      padding-left: 16px;
      font-style: italic;
    }

    .photo-quote cite {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-style: normal;
      letter-spacing: 0.5px;
    }

    /* RIGHT — form panel */
    .form-panel {
      width: 420px;
      flex-shrink: 0;
      background: #0d0f16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      overflow-y: auto;
      position: relative;
    }

    .form-panel::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: var(--accent2);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.08;
      bottom: -60px; right: -60px;
      pointer-events: none;
    }

    .form-inner {
      width: 100%;
      max-width: 340px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.65s 0.05s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-heading {
      margin-bottom: 32px;
    }

    .form-heading .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(108,143,255,0.1);
      border: 1px solid rgba(108,143,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .form-heading h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25;
    }

    .form-heading h2 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-heading p {
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      margin-top: 6px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 26px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }

    .tab.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(156,163,175,0.5); font-weight: 300; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,143,255,0.12);
      background: rgba(108,143,255,0.05);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn .btn-text { transition: opacity 0.2s; }
    .btn .spinner {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn.loading .btn-text { opacity: 0; }
    .btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .alert {
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }
    .alert.success { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.25);  color: var(--success); }
    .alert.show { display: block; }

    /* Mobile: stack vertically */
    @media (max-width: 768px) {
      .page { flex-direction: column; overflow: auto; }
      .photo-panel {
        flex: none;
        height: 240px;
      }
      .photo-brand h1 { font-size: 20px; }
      .photo-quote { display: none; }
      .form-panel {
        width: 100%;
        padding: 36px 24px 48px;
        min-height: auto;
      }
    }
  </style>
</head>

    <div class="photo-brand">
      <span class="logo-icon">🎓</span>
      <h1>Student <span>Feedback</span><br>Portal</h1>
      <p>Academic excellence starts here</p>
    </div>

    <div class="photo-quote">
      <blockquote>
        "Education is the most powerful weapon which you can use to change the world."
        <cite>— Nelson Mandela</cite>
      </blockquote>
    </div>
  </div>

  <!-- RIGHT: Form -->
  <div class="form-panel">
    <div class="form-inner">
      <div class="form-heading">
        <div class="badge">Academic Portal</div>
        <h2>Welcome <span>Back</span></h2>
        <p>Sign in or create your student account</p>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Sign In</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- LOGIN -->
      <div id="loginSection" class="form-section active">
        <div class="field">
          <label for="loginAdmission">Admission Number</label>
          <input type="text" id="loginAdmission" placeholder="e.g. ADM/2024/001" autocomplete="username"/>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
        </div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </div>

      <!-- REGISTER -->
      <div id="registerSection" class="form-section">
        <div class="field">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="e.g. Jane Mwangi"/>
        </div>
        <div class="field">
          <label for="regAdmission">Admission Number</label>
          <input type="text" id="regAdmission" placeholder="e.g. ADM/2024/001"/>
        </div>
        <div class="field">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters"/>
        </div>
        <div class="field">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="Repeat your password"/>
        </div>
        <button class="btn" id="registerBtn" onclick="handleRegister()">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('registerSection').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
  }

  function hideAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  function setLoading(btnId, state) {
    const btn = document.getElementById(btnId);
    btn.disabled = state;
    btn.classList.toggle('loading', state);
  }

  async function handleLogin() {
    const admission = document.getElementById('loginAdmission').value.trim();
    const password  = document.getElementById('loginPassword').value;
    if (!admission || !password) return showAlert('Please fill in all fields.');
    setLoading('loginBtn', true); hideAlert();
    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admissionNumber: admission, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert(data.message || 'Login failed.');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showAlert('Welcome back! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/', 800);
    } catch { showAlert('Network error. Please try again.'); }
    finally  { setLoading('loginBtn', false); }
  }

  async function handleRegister() {
    const name      = document.getElementById('regName').value.trim();
    const admission = document.getElementById('regAdmission').value.trim();
    const email     = document.getElementById('regEmail').value.trim();
    const password  = document.getElementById('regPassword').value;
    const confirm   = document.getElementById('regConfirm').value;
    if (!name || !admission || !email || !password || !confirm) return showAlert('Please fill in all fields.');
    if (password.length < 6) return showAlert('Password must be at least 6 characters.');
    if (password !== confirm) return showAlert('Passwords do not match.');
    setLoading('registerBtn', true); hideAlert();
    try {
      const res  = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, admissionNumber: admission, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert(data.message || 'Registration failed.');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showAlert('Account created! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/', 800);
    } catch { showAlert('Network error. Please try again.'); }
    finally  { setLoading('registerBtn', false); }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginSection').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
