<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Student Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: #2a2f42;
      --accent: #6c8fff;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #f87171;
      --success: #34d399;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.13;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -120px; left: -80px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-60px, -60px); } }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(108,143,255,0.3);
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
    }

    .logo h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); font-weight: 300; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,143,255,0.15);
    }

    input.error { border-color: var(--error); }

    .field-error {
      color: var(--error);
      font-size: 11px;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn .btn-text { transition: opacity 0.2s; }
    .btn .spinner {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn.loading .btn-text { opacity: 0; }
    .btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .alert {
      padding: 12px 15px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alert.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }
    .alert.success { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.25);  color: var(--success); }
    .alert.show { display: block; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 11px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <h1>Student <span>Feedback</span></h1>
      <p>Academic feedback portal</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Sign In</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- LOGIN -->
      <div id="loginSection" class="form-section active">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password"/>
        </div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </div>

      <!-- REGISTER -->
      <div id="registerSection" class="form-section">
        <div class="field">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="e.g. Jane Mwangi"/>
        </div>
        <div class="field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters"/>
        </div>
        <div class="field">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="Repeat your password"/>
        </div>
        <button class="btn" id="registerBtn" onclick="handleRegister()">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginSection').classList.toggle('active', tab === 'login');
      document.getElementById('registerSection').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }

    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }

    function setLoading(btnId, state) {
      const btn = document.getElementById(btnId);
      btn.disabled = state;
      btn.classList.toggle('loading', state);
    }

    async function handleLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) return showAlert('Please fill in all fields.');

      setLoading('loginBtn', true);
      hideAlert();

      try {
        const res  = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.message || 'Login failed.');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Welcome back! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/', 800);
      } catch {
        showAlert('Network error. Please try again.');
      } finally {
        setLoading('loginBtn', false);
      }
    }

    async function handleRegister() {
      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;

      if (!name || !email || !password || !confirm) return showAlert('Please fill in all fields.');
      if (password.length < 6) return showAlert('Password must be at least 6 characters.');
      if (password !== confirm) return showAlert('Passwords do not match.');

      setLoading('registerBtn', true);
      hideAlert();

      try {
        const res  = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.message || 'Registration failed.');

        showAlert('Account created! Signing you in…', 'success');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        setTimeout(() => window.location.href = '/', 800);
      } catch {
        showAlert('Network error. Please try again.');
      } finally {
        setLoading('registerBtn', false);
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('loginSection').classList.contains('active')) handleLogin();
      else handleRegister();
    });
  </script>
</body>
</html>
